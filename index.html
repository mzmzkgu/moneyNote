<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📒 내 가계부</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d1b14;
      --surface:    #152210;
      --card:       #1a2e1a;
      --card2:      #1f3520;
      --border:     #2a4230;
      --accent:     #4caf7d;
      --accent2:    #2e7d52;
      --accent-dim: rgba(76,175,125,0.15);
      --text:       #e8f0eb;
      --text-muted: #7aab8a;
      --text-dim:   #4a6a54;
      --red:        #e05c5c;
      --red-dim:    rgba(224,92,92,0.15);
      --yellow:     #e8c84a;
      --blue:       #5ca8e0;
      --radius:     12px;
      --radius-sm:  8px;
      --shadow:     0 4px 20px rgba(0,0,0,0.4);
    }

    html { font-size: 16px; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    #root { display: flex; flex-direction: column; min-height: 100dvh; max-width: 480px; margin: 0 auto; position: relative; }

    /* ── 헤더 ── */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 10px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .app-title { font-size: 1.15rem; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
    .header-btn {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 1.2rem; padding: 4px 8px; border-radius: var(--radius-sm);
      transition: color 0.2s, background 0.2s;
    }
    .header-btn:hover { color: var(--text); background: var(--accent-dim); }

    /* ── 탭 ── */
    .tabs {
      display: flex; background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto; scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 1; min-width: 70px; padding: 10px 4px;
      background: none; border: none; cursor: pointer;
      color: var(--text-dim); font-size: 0.78rem; font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 0.2s; white-space: nowrap;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── 콘텐츠 ── */
    .content { flex: 1; padding: 16px; overflow-y: auto; padding-bottom: 100px; }

    /* ── 월 네비게이터 ── */
    .month-nav {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border-radius: var(--radius); padding: 10px 14px;
      margin-bottom: 14px; border: 1px solid var(--border);
    }
    .month-nav-btn {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 1.2rem; padding: 4px 10px; border-radius: var(--radius-sm);
      transition: all 0.2s;
    }
    .month-nav-btn:hover { background: var(--accent-dim); color: var(--accent); }
    .month-label { font-size: 0.95rem; font-weight: 600; }

    /* ── 요약 카드 ── */
    .summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .summary-card {
      background: var(--card); border-radius: var(--radius); padding: 14px;
      border: 1px solid var(--border);
    }
    .summary-card.full { grid-column: 1 / -1; }
    .summary-label { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 4px; }
    .summary-amount {
      font-size: 1.15rem; font-weight: 700; font-variant-numeric: tabular-nums;
      letter-spacing: -0.5px;
    }
    .summary-amount.red { color: var(--red); }
    .summary-amount.green { color: var(--accent); }
    .summary-amount.yellow { color: var(--yellow); }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 24px; right: calc(50% - 240px + 16px);
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent); color: #0d1b14;
      border: none; cursor: pointer; font-size: 1.5rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(76,175,125,0.5);
      transition: transform 0.15s, box-shadow 0.15s;
      z-index: 200;
    }
    .fab:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(76,175,125,0.6); }
    .fab:active { transform: scale(0.95); }

    /* ── 모달 ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 300; animation: fadeIn 0.15s ease;
    }
    .modal {
      background: var(--card); border-radius: var(--radius) var(--radius) 0 0;
      width: 100%; max-width: 480px; padding: 20px 16px 36px;
      border-top: 1px solid var(--border);
      animation: slideUp 0.2s ease;
    }
    .modal-title {
      font-size: 1rem; font-weight: 700; margin-bottom: 16px;
      color: var(--accent); display: flex; align-items: center; gap: 6px;
    }
    .modal-close {
      margin-left: auto; background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 1.1rem;
    }

    /* ── 폼 ── */
    .form-row { margin-bottom: 12px; }
    .form-label { font-size: 0.73rem; color: var(--text-muted); margin-bottom: 5px; display: block; }
    .form-input, .form-select {
      width: 100%; background: var(--card2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 12px;
      color: var(--text); font-size: 0.9rem; font-family: inherit;
      transition: border-color 0.2s;
      appearance: none; -webkit-appearance: none;
    }
    .form-input:focus, .form-select:focus {
      outline: none; border-color: var(--accent);
    }
    .form-input::placeholder { color: var(--text-dim); }
    .form-input.amount { font-size: 1.1rem; font-weight: 600; font-variant-numeric: tabular-nums; }
    .form-row-inline { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

    .btn-row { display: flex; gap: 8px; margin-top: 16px; }
    .btn {
      flex: 1; padding: 12px; border-radius: var(--radius-sm);
      border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600;
      font-family: inherit; transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #0d1b14; }
    .btn-primary:hover { background: #5dc98e; }
    .btn-ghost { background: var(--card2); color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); }
    .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(224,92,92,0.3); }

    /* ── 지출 리스트 아이템 ── */
    .expense-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px;
      margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px;
      transition: border-color 0.2s;
      cursor: pointer;
    }
    .expense-item:hover { border-color: var(--accent2); }
    .expense-item.settled { opacity: 0.5; }
    .expense-item-check {
      width: 20px; height: 20px; flex-shrink: 0;
      border-radius: 50%; border: 2px solid var(--border);
      background: none; cursor: pointer; margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .expense-item-check.checked { background: var(--accent); border-color: var(--accent); }
    .expense-item-body { flex: 1; min-width: 0; }
    .expense-item-top { display: flex; align-items: center; justify-content: space-between; }
    .expense-item-place { font-weight: 600; font-size: 0.9rem; }
    .expense-item-amount { font-size: 0.95rem; font-weight: 700; color: var(--red); font-variant-numeric: tabular-nums; }
    .expense-item-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
    .expense-item-card { font-size: 0.72rem; color: var(--text-muted); background: var(--card2); padding: 2px 7px; border-radius: 99px; }
    .expense-item-time { font-size: 0.72rem; color: var(--text-dim); }
    .expense-item-note { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; font-style: italic; }
    .settled-badge { font-size: 0.65rem; color: var(--accent); background: var(--accent-dim); padding: 2px 6px; border-radius: 99px; }

    /* ── 날짜 그룹 헤더 ── */
    .date-group-header {
      font-size: 0.75rem; color: var(--text-muted); padding: 10px 2px 6px;
      border-bottom: 1px solid var(--border); margin-bottom: 8px;
      display: flex; justify-content: space-between;
    }

    /* ── 빈 상태 ── */
    .empty-state { text-align: center; padding: 48px 16px; color: var(--text-dim); }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.85rem; line-height: 1.6; }

    /* ── 차트 영역 ── */
    .chart-container { background: var(--card); border-radius: var(--radius); padding: 16px; border: 1px solid var(--border); margin-bottom: 14px; }
    .chart-title { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 14px; }
    .pie-wrapper { display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
    svg.pie { overflow: visible; }
    .chart-legend { display: flex; flex-direction: column; gap: 6px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-name { flex: 1; color: var(--text-muted); }
    .legend-pct { color: var(--text-muted); }
    .legend-amt { font-variant-numeric: tabular-nums; font-weight: 600; }

    /* ── Top5 ── */
    .top5-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 6px;
      display: flex; align-items: center; gap: 10px;
    }
    .top5-rank { font-size: 0.75rem; font-weight: 700; color: var(--text-dim); width: 20px; text-align: center; }
    .top5-rank.gold { color: #e8c84a; }
    .top5-rank.silver { color: #b0b8b8; }
    .top5-rank.bronze { color: #c87844; }
    .top5-body { flex: 1; min-width: 0; }
    .top5-place { font-size: 0.87rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top5-card { font-size: 0.7rem; color: var(--text-muted); }
    .top5-amt { font-size: 0.92rem; font-weight: 700; color: var(--red); font-variant-numeric: tabular-nums; }

    /* ── 옵션 패널 ── */
    .option-list { display: flex; flex-direction: column; gap: 8px; }
    .option-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px 16px;
      cursor: pointer; display: flex; align-items: center; gap: 12px;
      transition: border-color 0.2s;
    }
    .option-item:hover { border-color: var(--accent2); }
    .option-icon { font-size: 1.2rem; width: 28px; text-align: center; }
    .option-info { flex: 1; }
    .option-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 2px; }
    .option-desc { font-size: 0.75rem; color: var(--text-muted); }

    /* ── 카드 관리 ── */
    .card-tag {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 99px; padding: 4px 10px; margin: 4px;
      font-size: 0.8rem;
    }
    .card-tag-remove { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.9rem; margin-left: 2px; }
    .card-tag-remove:hover { color: var(--red); }
    .card-add-row { display: flex; gap: 8px; margin-top: 10px; }
    .card-add-input { flex: 1; }

    /* ── 애니메이션 ── */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .section-title {
      font-size: 0.75rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.8px; margin: 18px 0 8px;
    }

    /* 스크롤바 */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

/* ───── 유틸 ───── */
const fmt = (n) => '₩' + Math.abs(n).toLocaleString('ko-KR');
const today = () => { const d = new Date(); return d.toISOString().slice(0,10); };
const nowTime = () => { const d = new Date(); return d.toTimeString().slice(0,5); };
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

const CHART_COLORS = ['#4caf7d','#5ca8e0','#e8c84a','#e05c5c','#a07de8','#e08a5c','#5ce0c8','#c85ce0','#e0c85c'];

/* ───── 로컬스토리지 ───── */
const LS = {
  get: (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

/* ───── 파이차트 ───── */
function PieChart({ data }) {
  if (!data || data.length === 0) return (
    <div style={{ textAlign:'center', padding:'24px', color:'var(--text-dim)', fontSize:'0.85rem' }}>이번 달 지출 데이터 없음</div>
  );

  const total = data.reduce((s, d) => s + d.value, 0);
  const R = 80;
  const cx = 100, cy = 100;
  let angle = -Math.PI / 2;
  const slices = data.map((d, i) => {
    const pct = d.value / total;
    const startA = angle;
    angle += pct * 2 * Math.PI;
    const endA = angle;
    const largeArc = pct > 0.5 ? 1 : 0;
    const x1 = cx + R * Math.cos(startA), y1 = cy + R * Math.sin(startA);
    const x2 = cx + R * Math.cos(endA), y2 = cy + R * Math.sin(endA);
    return { d: `M ${cx} ${cy} L ${x1} ${y1} A ${R} ${R} 0 ${largeArc} 1 ${x2} ${y2} Z`, color: CHART_COLORS[i % CHART_COLORS.length], pct, label: d.label, value: d.value };
  });

  return (
    <div>
      <div className="pie-wrapper">
        <svg className="pie" width="200" height="200" viewBox="0 0 200 200">
          <circle cx={cx} cy={cy} r={R+4} fill="var(--card2)" />
          {slices.map((s, i) => <path key={i} d={s.d} fill={s.color} opacity="0.92" />)}
          <circle cx={cx} cy={cy} r={R-30} fill="var(--card)" />
          <text x={cx} y={cy-6} textAnchor="middle" fill="var(--text-muted)" fontSize="9">총 지출</text>
          <text x={cx} y={cy+10} textAnchor="middle" fill="var(--text)" fontSize="11" fontWeight="700">{fmt(total)}</text>
        </svg>
      </div>
      <div className="chart-legend">
        {slices.map((s, i) => (
          <div key={i} className="legend-item">
            <div className="legend-dot" style={{ background: s.color }} />
            <span className="legend-name">{s.label}</span>
            <span className="legend-pct">{(s.pct*100).toFixed(1)}%</span>
            <span className="legend-amt">{fmt(s.value)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ───── 지출 입력 모달 ───── */
function ExpenseModal({ onClose, onSave, editItem, cards }) {
  const [form, setForm] = useState(editItem ? { ...editItem } : {
    id: uid(), date: today(), time: nowTime(),
    amount: '', place: '', card: cards[0] || '현금', note: '', settled: false,
  });

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const handleSave = () => {
    if (!form.amount || !form.place) return alert('비용과 사용처를 입력해주세요');
    onSave({ ...form, amount: parseInt(form.amount.toString().replace(/,/g, ''), 10) || 0 });
    onClose();
  };

  const handleAmountChange = (e) => {
    const raw = e.target.value.replace(/[^\d]/g, '');
    set('amount', raw);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-title">
          ✏️ {editItem ? '지출 수정' : '지출 추가'}
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>

        <div className="form-row-inline">
          <div className="form-row" style={{marginBottom:0}}>
            <label className="form-label">날짜</label>
            <input className="form-input" type="date" value={form.date} onChange={e=>set('date',e.target.value)} />
          </div>
          <div className="form-row" style={{marginBottom:0}}>
            <label className="form-label">시간</label>
            <input className="form-input" type="time" value={form.time} onChange={e=>set('time',e.target.value)} />
          </div>
        </div>

        <div className="form-row" style={{marginTop:12}}>
          <label className="form-label">💰 비용 (원)</label>
          <input
            className="form-input amount" type="text" inputMode="numeric"
            placeholder="0" value={form.amount ? Number(form.amount).toLocaleString('ko-KR') : ''}
            onChange={handleAmountChange}
            autoFocus={!editItem}
          />
        </div>

        <div className="form-row">
          <label className="form-label">🏪 사용처</label>
          <input className="form-input" type="text" placeholder="예: 스타벅스, 마트, 주유소..." value={form.place} onChange={e=>set('place',e.target.value)} />
        </div>

        <div className="form-row">
          <label className="form-label">💳 결제수단</label>
          <select className="form-select" value={form.card} onChange={e=>set('card',e.target.value)}>
            {cards.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>

        <div className="form-row">
          <label className="form-label">📝 비고 (선택)</label>
          <input className="form-input" type="text" placeholder="메모..." value={form.note} onChange={e=>set('note',e.target.value)} />
        </div>

        <div className="btn-row">
          <button className="btn btn-ghost" onClick={onClose}>취소</button>
          <button className="btn btn-primary" onClick={handleSave}>{editItem ? '수정완료' : '저장'}</button>
        </div>
      </div>
    </div>
  );
}

/* ───── 설정 모달 ───── */
function SettingsModal({ onClose, cards, setCards, allData, setAllData }) {
  const [newCard, setNewCard] = useState('');

  const addCard = () => {
    const v = newCard.trim();
    if (v && !cards.includes(v)) { setCards([...cards, v]); setNewCard(''); }
  };
  const removeCard = (c) => { if (cards.length <= 1) return alert('최소 1개의 결제수단이 필요해요'); setCards(cards.filter(x => x !== c)); };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify({ expenses: allData, cards }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `가계부_백업_${today()}.json`; a.click();
  };

  const importJSON = () => {
    const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.expenses) { setAllData(data.expenses); }
          if (data.cards) { setCards(data.cards); }
          alert('✅ 복원 완료!');
        } catch { alert('❌ 파일 형식이 올바르지 않아요'); }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  const exportExcel = () => {
    if (allData.length === 0) return alert('데이터가 없어요');
    const ws = XLSX.utils.json_to_sheet(allData.map(e => ({
      날짜: e.date, 시간: e.time, 사용처: e.place,
      금액: e.amount, 결제수단: e.card, 비고: e.note || '',
      정산완료: e.settled ? 'Y' : 'N',
    })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '지출내역');
    XLSX.writeFile(wb, `가계부_${today()}.xlsx`);
  };

  const clearAll = () => {
    if (window.confirm('⚠️ 모든 데이터를 삭제할까요? 이 작업은 되돌릴 수 없어요.')) {
      setAllData([]); onClose();
    }
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-title">
          ⚙️ 설정
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>

        <div className="section-title" style={{marginTop:0}}>💳 결제수단 관리</div>
        <div style={{ background:'var(--card2)', borderRadius:'var(--radius-sm)', padding:'10px', border:'1px solid var(--border)', marginBottom:10 }}>
          <div style={{ display:'flex', flexWrap:'wrap' }}>
            {cards.map(c => (
              <span key={c} className="card-tag">
                {c}<button className="card-tag-remove" onClick={()=>removeCard(c)}>×</button>
              </span>
            ))}
          </div>
          <div className="card-add-row">
            <input className="form-input card-add-input" type="text" placeholder="새 결제수단 추가" value={newCard} onChange={e=>setNewCard(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCard()} />
            <button className="btn btn-primary" style={{flex:'none',padding:'10px 14px'}} onClick={addCard}>추가</button>
          </div>
        </div>

        <div className="section-title">📦 데이터</div>
        <div className="option-list">
          {[
            { icon:'💾', name:'JSON 백업', desc:'데이터를 JSON 파일로 저장', fn: exportJSON },
            { icon:'📂', name:'JSON 복원', desc:'백업 파일에서 데이터 불러오기', fn: importJSON },
            { icon:'📊', name:'엑셀로 내보내기', desc:'스프레드시트용 xlsx 파일 생성', fn: exportExcel },
          ].map(o => (
            <div key={o.name} className="option-item" onClick={o.fn}>
              <span className="option-icon">{o.icon}</span>
              <div className="option-info">
                <div className="option-name">{o.name}</div>
                <div className="option-desc">{o.desc}</div>
              </div>
              <span style={{color:'var(--text-dim)'}}>›</span>
            </div>
          ))}
        </div>

        <div style={{marginTop:16}}>
          <button className="btn btn-danger" style={{width:'100%'}} onClick={clearAll}>🗑️ 전체 데이터 삭제</button>
        </div>
      </div>
    </div>
  );
}

/* ───── 지출 탭 ───── */
function ExpenseTab({ expenses, setExpenses, cards }) {
  const [showModal, setShowModal] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [viewMonth, setViewMonth] = useState(() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; });

  const changeMonth = (delta) => {
    const [y, m] = viewMonth.split('-').map(Number);
    const d = new Date(y, m - 1 + delta, 1);
    setViewMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  };

  const monthItems = useMemo(() => expenses.filter(e => e.date.startsWith(viewMonth)).sort((a,b) => (b.date+b.time).localeCompare(a.date+a.time)), [expenses, viewMonth]);
  const totalAmt = useMemo(() => monthItems.reduce((s,e) => s+e.amount, 0), [monthItems]);
  const settledAmt = useMemo(() => monthItems.filter(e=>e.settled).reduce((s,e) => s+e.amount, 0), [monthItems]);
  const unsettledAmt = totalAmt - settledAmt;

  const grouped = useMemo(() => {
    const map = {};
    monthItems.forEach(e => { if (!map[e.date]) map[e.date] = []; map[e.date].push(e); });
    return Object.entries(map).sort((a,b) => b[0].localeCompare(a[0]));
  }, [monthItems]);

  const handleSave = (item) => {
    setExpenses(prev => editItem ? prev.map(e => e.id===item.id ? item : e) : [...prev, item]);
    setEditItem(null);
  };
  const handleToggleSettle = (id, e) => {
    e.stopPropagation();
    setExpenses(prev => prev.map(x => x.id===id ? {...x, settled:!x.settled} : x));
  };
  const handleEdit = (item) => { setEditItem(item); setShowModal(true); };
  const handleDelete = (id) => { if (window.confirm('이 항목을 삭제할까요?')) setExpenses(prev => prev.filter(x => x.id!==id)); };

  const [y, m] = viewMonth.split('-');
  const monthLabel = `${y}년 ${parseInt(m)}월`;

  return (
    <>
      <div className="month-nav">
        <button className="month-nav-btn" onClick={()=>changeMonth(-1)}>‹</button>
        <span className="month-label">{monthLabel}</span>
        <button className="month-nav-btn" onClick={()=>changeMonth(1)}>›</button>
      </div>

      <div className="summary-row">
        <div className="summary-card">
          <div className="summary-label">이번 달 총 지출</div>
          <div className="summary-amount red">{fmt(totalAmt)}</div>
        </div>
        <div className="summary-card">
          <div className="summary-label">미정산 잔액</div>
          <div className="summary-amount yellow">{fmt(unsettledAmt)}</div>
        </div>
      </div>

      {grouped.length === 0 ? (
        <div className="empty-state">
          <div className="icon">💸</div>
          <p>이번 달 지출 내역이 없어요<br/>오른쪽 아래 + 버튼으로 추가해보세요!</p>
        </div>
      ) : (
        grouped.map(([date, items]) => {
          const dayTotal = items.reduce((s,e) => s+e.amount, 0);
          const d = new Date(date); const days = ['일','월','화','수','목','금','토'];
          const dayLabel = `${parseInt(date.slice(5,7))}/${parseInt(date.slice(8,10))} (${days[d.getDay()]})`;
          return (
            <div key={date}>
              <div className="date-group-header">
                <span>{dayLabel}</span>
                <span style={{color:'var(--red)'}}>{fmt(dayTotal)}</span>
              </div>
              {items.map(item => (
                <div key={item.id} className={`expense-item${item.settled?' settled':''}`} onClick={()=>handleEdit(item)}>
                  <button className={`expense-item-check${item.settled?' checked':''}`} onClick={e=>handleToggleSettle(item.id,e)}>
                    {item.settled && <span style={{color:'#0d1b14',fontSize:'0.7rem',fontWeight:700}}>✓</span>}
                  </button>
                  <div className="expense-item-body">
                    <div className="expense-item-top">
                      <span className="expense-item-place">{item.place}</span>
                      <span className="expense-item-amount">{fmt(item.amount)}</span>
                    </div>
                    <div className="expense-item-meta">
                      <span className="expense-item-card">{item.card}</span>
                      <span className="expense-item-time">{item.time}</span>
                      {item.settled && <span className="settled-badge">✓ 정산완료</span>}
                    </div>
                    {item.note && <div className="expense-item-note">"{item.note}"</div>}
                  </div>
                  <button style={{background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',padding:'0 0 0 4px',fontSize:'0.85rem'}}
                    onClick={e=>{e.stopPropagation();handleDelete(item.id)}}>✕</button>
                </div>
              ))}
            </div>
          );
        })
      )}

      {(showModal || editItem) && (
        <ExpenseModal cards={cards} editItem={editItem} onClose={()=>{setShowModal(false);setEditItem(null);}} onSave={handleSave} />
      )}

      <button className="fab" onClick={()=>{setEditItem(null);setShowModal(true);}}>＋</button>
    </>
  );
}

/* ───── 통계 탭 ───── */
function StatsTab({ expenses }) {
  const [viewMonth, setViewMonth] = useState(() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; });

  const changeMonth = (delta) => {
    const [y, m] = viewMonth.split('-').map(Number);
    const d = new Date(y, m - 1 + delta, 1);
    setViewMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  };

  const monthItems = useMemo(() => expenses.filter(e => e.date.startsWith(viewMonth)), [expenses, viewMonth]);

  const cardData = useMemo(() => {
    const map = {};
    monthItems.forEach(e => { map[e.card] = (map[e.card]||0) + e.amount; });
    return Object.entries(map).map(([label, value]) => ({ label, value })).sort((a,b)=>b.value-a.value);
  }, [monthItems]);

  const top5 = useMemo(() => [...monthItems].sort((a,b)=>b.amount-a.amount).slice(0,5), [monthItems]);

  const [y, m] = viewMonth.split('-');
  const monthLabel = `${y}년 ${parseInt(m)}월`;

  return (
    <>
      <div className="month-nav">
        <button className="month-nav-btn" onClick={()=>changeMonth(-1)}>‹</button>
        <span className="month-label">{monthLabel} 통계</span>
        <button className="month-nav-btn" onClick={()=>changeMonth(1)}>›</button>
      </div>

      <div className="chart-container">
        <div className="chart-title">결제수단별 지출 비중</div>
        <PieChart data={cardData} />
      </div>

      <div className="section-title">🏆 지출 Top 5</div>
      {top5.length === 0 ? (
        <div className="empty-state"><div className="icon">📊</div><p>데이터가 없어요</p></div>
      ) : (
        top5.map((item, i) => (
          <div key={item.id} className="top5-item">
            <div className={`top5-rank${i===0?' gold':i===1?' silver':i===2?' bronze':''}`}>{i+1}</div>
            <div className="top5-body">
              <div className="top5-place">{item.place}</div>
              <div className="top5-card">{item.date} · {item.card}</div>
            </div>
            <div className="top5-amt">{fmt(item.amount)}</div>
          </div>
        ))
      )}

      {monthItems.length > 0 && (
        <>
          <div className="section-title">📅 이번 달 요약</div>
          <div className="summary-row">
            <div className="summary-card">
              <div className="summary-label">총 지출 건수</div>
              <div className="summary-amount green">{monthItems.length}건</div>
            </div>
            <div className="summary-card">
              <div className="summary-label">건당 평균</div>
              <div className="summary-amount">{fmt(Math.round(monthItems.reduce((s,e)=>s+e.amount,0)/monthItems.length))}</div>
            </div>
            <div className="summary-card">
              <div className="summary-label">정산 완료</div>
              <div className="summary-amount green">{monthItems.filter(e=>e.settled).length}건</div>
            </div>
            <div className="summary-card">
              <div className="summary-label">정산 미완료</div>
              <div className="summary-amount yellow">{monthItems.filter(e=>!e.settled).length}건</div>
            </div>
          </div>
        </>
      )}
    </>
  );
}

/* ───── 설정 탭 ───── */
function SettingsTab({ cards, setCards, allData, setAllData }) {
  const exportJSON = () => {
    const blob = new Blob([JSON.stringify({ expenses: allData, cards }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `가계부_백업_${today()}.json`; a.click();
  };

  const importJSON = () => {
    const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.expenses) setAllData(data.expenses);
          if (data.cards) setCards(data.cards);
          alert('✅ 복원 완료!');
        } catch { alert('❌ 파일 형식이 올바르지 않아요'); }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  const exportExcel = () => {
    if (allData.length === 0) return alert('데이터가 없어요');
    const ws = XLSX.utils.json_to_sheet(allData.map(e => ({
      날짜: e.date, 시간: e.time, 사용처: e.place,
      금액: e.amount, 결제수단: e.card, 비고: e.note || '',
      정산완료: e.settled ? 'Y' : 'N',
    })));
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, '지출내역');
    XLSX.writeFile(wb, `가계부_${today()}.xlsx`);
  };

  const [newCard, setNewCard] = useState('');
  const addCard = () => { const v = newCard.trim(); if (v && !cards.includes(v)) { setCards([...cards, v]); setNewCard(''); } };
  const removeCard = (c) => { if (cards.length <= 1) return alert('최소 1개 필요해요'); setCards(cards.filter(x=>x!==c)); };

  return (
    <>
      <div className="section-title" style={{marginTop:0}}>💳 결제수단 관리</div>
      <div style={{ background:'var(--card)', borderRadius:'var(--radius)', padding:'14px', border:'1px solid var(--border)', marginBottom:14 }}>
        <div style={{ display:'flex', flexWrap:'wrap', marginBottom:8 }}>
          {cards.map(c => (
            <span key={c} className="card-tag">
              {c}<button className="card-tag-remove" onClick={()=>removeCard(c)}>×</button>
            </span>
          ))}
        </div>
        <div className="card-add-row">
          <input className="form-input card-add-input" type="text" placeholder="새 결제수단 입력" value={newCard} onChange={e=>setNewCard(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCard()} />
          <button className="btn btn-primary" style={{flex:'none',padding:'10px 14px'}} onClick={addCard}>추가</button>
        </div>
      </div>

      <div className="section-title">📦 데이터 관리</div>
      <div className="option-list">
        {[
          { icon:'💾', name:'JSON 백업', desc:'모든 데이터를 JSON 파일로 저장', fn: exportJSON },
          { icon:'📂', name:'JSON 복원', desc:'백업 파일에서 데이터 불러오기', fn: importJSON },
          { icon:'📊', name:'엑셀 내보내기', desc:'스프레드시트용 .xlsx 파일 생성', fn: exportExcel },
        ].map(o => (
          <div key={o.name} className="option-item" onClick={o.fn}>
            <span className="option-icon">{o.icon}</span>
            <div className="option-info">
              <div className="option-name">{o.name}</div>
              <div className="option-desc">{o.desc}</div>
            </div>
            <span style={{color:'var(--text-dim)'}}>›</span>
          </div>
        ))}
      </div>

      <div style={{marginTop:16}}>
        <button className="btn btn-danger" style={{width:'100%'}} onClick={()=>{
          if (window.confirm('⚠️ 모든 데이터를 삭제할까요? 되돌릴 수 없어요.')) setAllData([]);
        }}>🗑️ 전체 데이터 삭제</button>
      </div>

      <div style={{marginTop:24, padding:'16px', background:'var(--card)', borderRadius:'var(--radius)', border:'1px solid var(--border)'}}>
        <div style={{fontSize:'0.75rem', color:'var(--text-muted)', lineHeight:1.8}}>
          <div>📱 내 가계부 v1.0</div>
          <div>🔒 데이터는 기기 로컬에만 저장돼요</div>
          <div>⭕ 정산완료 체크 = 생활비 돌려받은 항목</div>
        </div>
      </div>
    </>
  );
}

/* ───── 메인 앱 ───── */
function App() {
  const [tab, setTab] = useState('expense');
  const [expenses, setExpenses] = useState(() => LS.get('expenses', []));
  const [cards, setCards] = useState(() => LS.get('cards', ['현금','신한카드','신한체크','카카오페이','삼성페이','하나카드','KB국민카드','케이뱅크','토스']));

  useEffect(() => { LS.set('expenses', expenses); }, [expenses]);
  useEffect(() => { LS.set('cards', cards); }, [cards]);

  const tabs = [
    { id:'expense', label:'💸 지출' },
    { id:'stats',   label:'📊 통계' },
    { id:'settings',label:'⚙️ 설정' },
  ];

  return (
    <div id="app">
      <header className="app-header">
        <div className="app-title">📒 내 가계부</div>
        <div style={{fontSize:'0.72rem', color:'var(--text-muted)'}}>
          총 {expenses.length}건
        </div>
      </header>

      <nav className="tabs">
        {tabs.map(t => (
          <button key={t.id} className={`tab-btn${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>
            {t.label}
          </button>
        ))}
      </nav>

      <main className="content">
        {tab === 'expense' && <ExpenseTab expenses={expenses} setExpenses={setExpenses} cards={cards} />}
        {tab === 'stats'   && <StatsTab expenses={expenses} />}
        {tab === 'settings'&& <SettingsTab cards={cards} setCards={setCards} allData={expenses} setAllData={setExpenses} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
